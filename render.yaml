# Optional: Render Blueprint — New Blueprint → connect this repo
# https://render.com/docs/blueprint-spec
#
# CLAN_EVENTS_SECRET is required for Events unlock + POST /api/custom-events.
# Declared below with sync: false — set the value in the Render dashboard (never commit it).
#
# Optional: DISCORD_EVENTS_WEBHOOK_URL (Incoming Webhook URL) posts new events to Discord.
# Optional: PUBLIC_SITE_URL for calendar link in the embed. See DISCORD_EVENTS.md.
#
# Clan events file: on Render the filesystem is ephemeral unless you use a persistent disk (paid
# web services) or point CUSTOM_EVENTS_DIR at a mounted path. Free tier: add a disk after upgrading,
# or use an external DB / KV store. Node app path for repo _data is usually:
#   /opt/render/project/src/_data
# Dashboard → your service → Disks → add disk with that mount path (then redeploy).
services:
  - type: web
    name: terpinheimer-site
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: LIVE_MAP_SECRET
        sync: false
      - key: RUNELITE_CLAN_EVENTS_SECRET
        sync: false
      - key: CLAN_EVENTS_SECRET
        sync: false
      # Paste your Discord Incoming Webhook URL in the dashboard (same as local .env DISCORD_EVENTS_WEBHOOK_URL).
      - key: DISCORD_EVENTS_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_USERNAME
        value: Terpinheimer.com

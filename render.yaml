# Optional: Render Blueprint — New Blueprint → connect this repo
# https://render.com/docs/blueprint-spec
#
# CLAN_EVENTS_SECRET is required for Events unlock + POST /api/custom-events.
# Declared below with sync: false — set the value in the Render dashboard (never commit it).
#
# Optional: DISCORD_EVENTS_WEBHOOK_URL (Incoming Webhook URL) posts new events to Discord.
# Optional: PUBLIC_SITE_URL for calendar link in the embed. See DISCORD_EVENTS.md.
#
# Clan events (custom-events.json) and admin accounts (admin-users.json) are written at runtime.
# Without a persistent disk + env vars, Render's filesystem is ephemeral: every deploy starts fresh
# and that data disappears. This blueprint mounts a disk at /var/data and sets CUSTOM_EVENTS_DIR
# and ADMIN_USERS_DIR so both files live on the disk. Persistent disks require a compatible plan
# (see https://render.com/docs/disks). If you create the service manually, add a disk with the same
# mount path and set CUSTOM_EVENTS_DIR and ADMIN_USERS_DIR in the dashboard.
services:
  - type: web
    name: terpinheimer-site
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: clan-calendar-events
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: LIVE_MAP_SECRET
        sync: false
      - key: RUNELITE_CLAN_EVENTS_SECRET
        sync: false
      - key: CLAN_EVENTS_SECRET
        sync: false
      # Paste your Discord Incoming Webhook URL in the dashboard (same as local .env DISCORD_EVENTS_WEBHOOK_URL).
      - key: DISCORD_EVENTS_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_USERNAME
        value: Terpinheimer.com
      - key: CUSTOM_EVENTS_DIR
        value: /var/data
      - key: ADMIN_USERS_DIR
        value: /var/data
